name: Bubble Sector Scanner

on:
  schedule:
    # 09:45 Bangkok (02:45 UTC) — หลังตลาด US เปิด 15 นาที
    - cron: '45 2 * * 1-5'
    # 22:30 Bangkok (15:30 UTC) — ก่อนตลาด US ปิด 30 นาที
    - cron: '30 15 * * 1-5'
  workflow_dispatch:  # Manual trigger

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Bubble Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bubble_scanner_bot.py
