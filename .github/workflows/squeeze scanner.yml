name: Squeeze Scanner

on:
  schedule:
    - cron: '0 2 * * 1-5'
    - cron: '30 9 * * 1-5'
  workflow_dispatch:

jobs:
  squeeze-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Squeeze Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python squeeze_scanner_bot.py
