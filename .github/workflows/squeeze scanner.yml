name: Squeeze Scanner

on:
  schedule:
    # ── รัน 2 รอบต่อวัน (วันจันทร์–ศุกร์) ──
    # 02:00 UTC = 09:00 Bangkok (ตลาดเปิด pre-market)
    # 09:30 UTC = 16:30 Bangkok (หลังตลาด US ปิด)
    - cron: '0 2 * * 1-5'
    - cron: '30 9 * * 1-5'

  # กด Run ด้วยตัวเองได้จาก GitHub Actions tab
  workflow_dispatch:

jobs:
  squeeze-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      -      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pandas_ta --no-deps

      - name: Run Squeeze Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python squeeze_scanner_bot.py
