name: Momentum & Short Squeeze Scanner

on:
  schedule:
    - cron: '30 0 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # เพิ่มจาก 30 → 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write momentum_bot.py
        run: |
          cat > momentum_bot.py << 'PYEOF'
          import os, time, requests, yfinance as yf, pytz
          from curl_cffi import requests as cffi_requests
          from datetime import datetime

          BOT_TOKEN = os.environ['TELEGRAM_BOT_TOKEN']
          CHAT_ID   = os.environ['TELEGRAM_CHAT_ID']
          TIMEZONE  = 'Asia/Bangkok'
          TOP_N     = 5

          WATCHLIST = [
              'FCEL','ELPW','KEEL',
              'PLUG','BE','BLDP','HTOO',
              'SMR','OKLO','NNE','CEG','VST',
              'IONQ','QBTS','QUBT','RGTI','ARQQ',
              'BBAI','SOUN','AIXI','APLD',
              'ARRY','NOVA','SHLS','STEM',
              'MVST','ENVX','FREYR',
              'ASTS','ACHR','JOBY',
              'SMCI','COHR','VRT','PATH',
              'PRCT','GTLB','OPEN','AIOT',
          ]
          WATCHLIST = list(dict.fromkeys(WATCHLIST))

          # ✅ PATCHED: send() มี fallback + ไม่ raise_for_status() ที่ทำให้ run พัง
          def send(text):
              if len(text) > 4000:
                  text = text[:3990] + '...'
              try:
                  r = requests.post(
                      'https://api.telegram.org/bot' + BOT_TOKEN + '/sendMessage',
                      json={'chat_id': CHAT_ID, 'text': text, 'parse_mode': 'HTML'},
                      timeout=15,
                  )
                  if r.status_code != 200:
                      # Fallback: ส่งแบบ plain text ถ้า HTML parse error
                      plain = (text
                          .replace('<b>','').replace('</b>','')
                          .replace('<i>','').replace('</i>','')
                      )
                      requests.post(
                          'https://api.telegram.org/bot' + BOT_TOKEN + '/sendMessage',
                          json={'chat_id': CHAT_ID, 'text': plain},
                          timeout=15,
                      )
              except Exception as e:
                  print('Telegram error: ' + str(e))
              time.sleep(0.5)

          def calc_atr(hist, period=14):
              if hist.empty or len(hist) < 2: return 0
              highs  = hist['High'].values
              lows   = hist['Low'].values
              closes = hist['Close'].values
              trs = []
              for i in range(1, min(period+1, len(closes))):
                  tr = max(
                      highs[-i] - lows[-i],
                      abs(highs[-i] - closes[-i-1]),
                      abs(lows[-i]  - closes[-i-1]),
                  )
                  trs.append(tr)
              return sum(trs) / len(trs) if trs else 0

          def fetch(ticker):
              try:
                  session = cffi_requests.Session(impersonate='chrome')
                  t = yf.Ticker(ticker, session=session)
                  info = t.info
                  price = info.get('currentPrice') or info.get('regularMarketPrice')
                  if not price or price <= 0:
                      return None
                  hist = t.history(period='1y')
                  if hist.empty or len(hist) < 10:
                      return None
                  closes  = hist['Close']
                  volumes = hist['Volume']
                  high52     = closes.max()
                  low52      = closes.min()
                  ma20       = closes[-20:].mean() if len(closes) >= 20 else closes.mean()
                  ma50       = closes[-50:].mean() if len(closes) >= 50 else closes.mean()
                  avg_vol_20 = volumes[-20:].mean() if len(volumes) >= 20 else volumes.mean()
                  avg_vol_5  = volumes[-5:].mean()  if len(volumes) >= 5  else volumes.mean()
                  ret_1w  = (closes.iloc[-1] - closes.iloc[-6])  / closes.iloc[-6]  if len(closes) >= 6  else 0
                  ret_1m  = (closes.iloc[-1] - closes.iloc[-22]) / closes.iloc[-22] if len(closes) >= 22 else 0
                  ret_3m  = (closes.iloc[-1] - closes.iloc[-66]) / closes.iloc[-66] if len(closes) >= 66 else 0
                  atr     = calc_atr(hist, 14)
                  atr_pct = (atr / float(price)) * 100
                  return {
                      'ticker':        ticker,
                      'name':          info.get('shortName', ticker),
                      'price':         float(price),
                      'mktcap':        info.get('marketCap') or 0,
                      'high52':        float(high52),
                      'low52':         float(low52),
                      'ma20':          float(ma20),
                      'ma50':          float(ma50),
                      'vol_surge':     float(avg_vol_5 / avg_vol_20) if avg_vol_20 > 0 else 0,
                      'ret_1w':        float(ret_1w),
                      'ret_1m':        float(ret_1m),
                      'ret_3m':        float(ret_3m),
                      'short_pct':     info.get('shortPercentOfFloat') or 0,
                      'short_ratio':   info.get('shortRatio') or 0,
                      'pct_from_low':  (float(price) - float(low52))  / float(low52)  if low52  > 0 else 0,
                      'pct_from_high': (float(high52) - float(price)) / float(high52) if high52 > 0 else 0,
                      'atr':           atr,
                      'atr_pct':       atr_pct,
                      'desc':          (info.get('longBusinessSummary') or '')[:100],
                  }
              except Exception as e:
                  print(ticker + ' error: ' + str(e))
                  return None

          def calc_levels(price, atr, mode):
              if mode == 'squeeze':
                  sl  = round(price - 2.0 * atr, 2)
                  tp1 = round(price + 2.0 * atr, 2)
                  tp2 = round(price + 4.0 * atr, 2)
                  tp3 = round(price + 8.0 * atr, 2)
              else:
                  sl  = round(price - 1.5 * atr, 2)
                  tp1 = round(price + 1.5 * atr, 2)
                  tp2 = round(price + 3.0 * atr, 2)
                  tp3 = round(price + 6.0 * atr, 2)
              sl_pct  = round((sl  - price) / price * 100, 1)
              tp1_pct = round((tp1 - price) / price * 100, 1)
              tp2_pct = round((tp2 - price) / price * 100, 1)
              tp3_pct = round((tp3 - price) / price * 100, 1)
              return sl, tp1, tp2, tp3, sl_pct, tp1_pct, tp2_pct, tp3_pct

          def squeeze_score(d):
              score = 0
              signals = []
              if d['short_pct'] >= 0.10:
                  score += 25; signals.append('Short ' + str(round(d['short_pct']*100, 1)) + '%')
              elif d['short_pct'] >= 0.05:
                  score += 12; signals.append('Short ' + str(round(d['short_pct']*100, 1)) + '%')
              if d['short_ratio'] >= 3:
                  score += 15; signals.append('DTC ' + str(round(d['short_ratio'], 1)) + 'd')
              elif d['short_ratio'] >= 1.5:
                  score += 8;  signals.append('DTC ' + str(round(d['short_ratio'], 1)) + 'd')
              if d['vol_surge'] >= 2.0:
                  score += 25; signals.append('VolSurge ' + str(round(d['vol_surge'], 1)) + 'x')
              elif d['vol_surge'] >= 1.3:
                  score += 12; signals.append('VolSurge ' + str(round(d['vol_surge'], 1)) + 'x')
              if d['ret_1w'] >= 0.10:
                  score += 20; signals.append('1W +' + str(round(d['ret_1w']*100)) + '%')
              elif d['ret_1w'] >= 0.05:
                  score += 10; signals.append('1W +' + str(round(d['ret_1w']*100)) + '%')
              if d['price'] > d['ma20']:
                  score += 10; signals.append('Above MA20')
              if d['pct_from_low'] <= 1.0:
                  score += 5;  signals.append('Low+' + str(round(d['pct_from_low']*100)) + '%')
              if score < 25:
                  return None
              p = d['price']
              sl, tp1, tp2, tp3, sl_pct, tp1_pct, tp2_pct, tp3_pct = calc_levels(p, d['atr'], 'squeeze')
              return {
                  'ticker': d['ticker'], 'name': d['name'], 'score': score,
                  'price': p, 'mktcap': d['mktcap'], 'atr_pct': d['atr_pct'],
                  'sl': sl, 'tp1': tp1, 'tp2': tp2, 'tp3': tp3,
                  'sl_pct': sl_pct, 'tp1_pct': tp1_pct, 'tp2_pct': tp2_pct, 'tp3_pct': tp3_pct,
                  'metrics': ' / '.join(signals) if signals else 'n/a',
                  'ret_1w': d['ret_1w'], 'desc': d['desc'],
              }

          def breakout_score(d):
              score = 0
              signals = []
              if d['pct_from_high'] <= 0.05:
                  score += 30; signals.append('At 52W High')
              elif d['pct_from_high'] <= 0.15:
                  score += 20; signals.append(str(round(d['pct_from_high']*100)) + '% from High')
              elif d['pct_from_high'] <= 0.25:
                  score += 10; signals.append(str(round(d['pct_from_high']*100)) + '% from High')
              if d['vol_surge'] >= 2.0:
                  score += 25; signals.append('VolSurge ' + str(round(d['vol_surge'], 1)) + 'x')
              elif d['vol_surge'] >= 1.3:
                  score += 12; signals.append('VolSurge ' + str(round(d['vol_surge'], 1)) + 'x')
              if d['ret_1m'] >= 0.20:
                  score += 25; signals.append('1M +' + str(round(d['ret_1m']*100)) + '%')
              elif d['ret_1m'] >= 0.10:
                  score += 12; signals.append('1M +' + str(round(d['ret_1m']*100)) + '%')
              if d['ret_3m'] >= 0.30:
                  score += 20; signals.append('3M +' + str(round(d['ret_3m']*100)) + '%')
              if d['price'] > d['ma20'] and d['price'] > d['ma50']:
                  score += 10; signals.append('MA stack OK')
              if score < 30:
                  return None
              p = d['price']
              sl, tp1, tp2, tp3, sl_pct, tp1_pct, tp2_pct, tp3_pct = calc_levels(p, d['atr'], 'breakout')
              return {
                  'ticker': d['ticker'], 'name': d['name'], 'score': score,
                  'price': p, 'mktcap': d['mktcap'], 'atr_pct': d['atr_pct'],
                  'sl': sl, 'tp1': tp1, 'tp2': tp2, 'tp3': tp3,
                  'sl_pct': sl_pct, 'tp1_pct': tp1_pct, 'tp2_pct': tp2_pct, 'tp3_pct': tp3_pct,
                  'metrics': ' / '.join(signals) if signals else 'n/a',
                  'ret_1m': d['ret_1m'], 'ret_3m': d['ret_3m'],
                  'pct_from_high': d['pct_from_high'], 'desc': d['desc'],
              }

          def fmt_cap(mktcap):
              if mktcap >= 1e9:   return str(round(mktcap/1e9, 1)) + 'B'
              elif mktcap >= 1e6: return str(round(mktcap/1e6)) + 'M'
              return 'N/A'

          def fmt_sq(rank, s):
              lines = [
                  '',
                  '#' + str(rank) + ' ' + s['ticker'] + ' - ' + s['name'],
                  '  Score: ' + str(s['score']) + ' | Cap: ' + fmt_cap(s['mktcap']) + ' | ATR: ' + str(round(s['atr_pct'], 1)) + '%/day',
                  '  Buy: $' + str(round(s['price'], 2)),
                  '  SL:  $' + str(s['sl'])  + ' (' + str(s['sl_pct'])  + '%)',
                  '  TP1: $' + str(s['tp1']) + ' (+' + str(s['tp1_pct']) + '%)',
                  '  TP2: $' + str(s['tp2']) + ' (+' + str(s['tp2_pct']) + '%)',
                  '  TP3: $' + str(s['tp3']) + ' (+' + str(s['tp3_pct']) + '%)',
                  '  ' + s['metrics'],
              ]
              if s['desc']: lines.append('  ' + s['desc'])
              return '\n'.join(lines)

          def fmt_bo(rank, s):
              lines = [
                  '',
                  '#' + str(rank) + ' ' + s['ticker'] + ' - ' + s['name'],
                  '  Score: ' + str(s['score']) + ' | Cap: ' + fmt_cap(s['mktcap']) + ' | ATR: ' + str(round(s['atr_pct'], 1)) + '%/day',
                  '  Buy: $' + str(round(s['price'], 2)),
                  '  SL:  $' + str(s['sl'])  + ' (' + str(s['sl_pct'])  + '%)',
                  '  TP1: $' + str(s['tp1']) + ' (+' + str(s['tp1_pct']) + '%)',
                  '  TP2: $' + str(s['tp2']) + ' (+' + str(s['tp2_pct']) + '%)',
                  '  TP3: $' + str(s['tp3']) + ' (+' + str(s['tp3_pct']) + '%)',
                  '  ' + s['metrics'],
              ]
              if s['desc']: lines.append('  ' + s['desc'])
              return '\n'.join(lines)

          def main():
              print('Scanning ' + str(len(WATCHLIST)) + ' tickers...')
              sq_list, bo_list = [], []
              for ticker in WATCHLIST:
                  d = fetch(ticker)
                  if not d: continue
                  r = squeeze_score(d)
                  if r: sq_list.append(r)
                  r = breakout_score(d)
                  if r: bo_list.append(r)
              sq_list.sort(key=lambda x: -x['score'])
              bo_list.sort(key=lambda x: -x['score'])
              today = datetime.now(pytz.timezone(TIMEZONE)).strftime('%d %b %Y')
              send(
                  '<b>Momentum Scanner - ' + today + '</b>\n'
                  'SHORT SQUEEZE | BREAKOUT\n'
                  'SL/TP คำนวณจาก ATR 14 วันของแต่ละหุ้น\n'
                  'High risk — verify before trading.'
              )
              if sq_list:
                  send(
                      '<b>SHORT SQUEEZE Setup</b>\n'
                      '(SL=2xATR / TP1=2xATR / TP2=4xATR / TP3=8xATR)'
                      + ''.join(fmt_sq(i+1, s) for i, s in enumerate(sq_list[:TOP_N]))
                  )
              else:
                  send('<b>SHORT SQUEEZE</b>\nNo setups today.')
              if bo_list:
                  send(
                      '<b>BREAKOUT Momentum</b>\n'
                      '(SL=1.5xATR / TP1=1.5xATR / TP2=3xATR / TP3=6xATR)'
                      + ''.join(fmt_bo(i+1, s) for i, s in enumerate(bo_list[:TOP_N]))
                  )
              else:
                  send('<b>BREAKOUT Momentum</b>\nNo breakouts today.')
              print('Done.')

          main()
          PYEOF

      - name: Run momentum scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python momentum_bot.py
