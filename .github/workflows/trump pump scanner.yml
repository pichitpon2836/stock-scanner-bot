# .github/workflows/trump pump scanner.yml
# สแกนหาหุ้น Trump Pump ทุกวันจันทร์-ศุกร์ เวลา 09:45 ET (หลังตลาดเปิด 15 นาที)

name: 🇺🇸 Trump Pump Scanner

on:
  schedule:
    # 09:45 ET = 13:45 UTC
    - cron: '45 13 * * 1-5'
  workflow_dispatch:

jobs:
  trump-pump-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Trump Pump Scanner
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python trump_pump_scanner.py
