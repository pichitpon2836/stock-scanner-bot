name: VI Stock Scanner Daily

on:
  schedule:
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fix all smart quotes in bot.py
        run: |
          python3 << 'PYEOF'
          data = open('bot.py', 'rb').read()
          data = data.replace(b'\xe2\x80\x9c', b'"')
          data = data.replace(b'\xe2\x80\x9d', b'"')
          data = data.replace(b'\xe2\x80\x98', b"'")
          data = data.replace(b'\xe2\x80\x99', b"'")
          open('bot.py', 'wb').write(data)
          print('Quotes fixed')
          PYEOF

      - name: Run scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py
