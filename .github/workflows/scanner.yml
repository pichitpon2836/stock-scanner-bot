name: VI Stock Scanner Daily

on:
  schedule:
    # 07:00 Bangkok time = 00:00 UTC
    - cron: '0 0 * * 1-5'   # จันทร์-ศุกร์ เท่านั้น (ตลาดเปิด)
  workflow_dispatch:          # กดรันมือได้จาก GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run VI Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
