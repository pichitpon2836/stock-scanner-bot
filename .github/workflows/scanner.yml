name: VI Stock Scanner Daily

on:
  schedule:
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests pytz curl_cffi

      - name: Write bot.py
        run: |
          cat > bot.py << 'PYEOF'
          import os, time, requests, yfinance as yf, pytz
          from curl_cffi import requests as cffi_requests
          from datetime import datetime

          BOT_TOKEN = os.environ['TELEGRAM_BOT_TOKEN']
          CHAT_ID   = os.environ['TELEGRAM_CHAT_ID']
          TIMEZONE  = 'Asia/Bangkok'
          TOP_N     = 3

          WATCHLIST = [
              'AAPL','MSFT','GOOGL','AMZN','META','NVDA','BRK-B',
              'JPM','V','MA','UNH','JNJ','PG','KO','WMT',
              'HD','COST','ADBE','CRM','NFLX','TSM','AVGO',
              'LLY','TMO','ABBV','MCD','NKE','SBUX','DIS',
              'SCHW','CI','TTD','FDS','KR',
          ]

          def send(text):
              r = requests.post(
                  'https://api.telegram.org/bot' + BOT_TOKEN + '/sendMessage',
                  json={'chat_id': CHAT_ID, 'text': text, 'parse_mode': 'HTML'},
                  timeout=15,
              )
              r.raise_for_status()
              time.sleep(0.5)

          def fetch(ticker):
              try:
                  session = cffi_requests.Session(impersonate='chrome')
                  t = yf.Ticker(ticker, session=session)
                  info = t.info
                  price = info.get('currentPrice') or info.get('regularMarketPrice')
                  if not price:
                      return None
                  hist = t.history(period='1y')
                  if hist.empty or len(hist) < 50:
                      return None
                  closes = hist['Close']
                  volumes = hist['Volume']
                  ma50  = closes[-50:].mean()
                  ma200 = closes[-200:].mean() if len(closes) >= 200 else closes.mean()
                  high52 = closes.max()
                  avg_vol = volumes[-20:].mean()
                  last_vol = volumes[-1]
                  return {
                      'ticker': ticker,
                      'name': info.get('shortName', ticker),
                      'price': float(price),
                      'eps_fwd': info.get('forwardEps'),
                      'eps_ttm': info.get('trailingEps'),
                      'growth': info.get('earningsGrowth') or info.get('revenueGrowth'),
                      'rev_growth': info.get('revenueGrowth'),
                      'fcf': info.get('freeCashflow'),
                      'shares': info.get('sharesOutstanding'),
                      'roe': info.get('returnOnEquity'),
                      'net_margin': info.get('profitMargins'),
                      'gross_margin': info.get('grossMargins'),
                      'peg': info.get('pegRatio'),
                      'insider_pct': info.get('heldPercentInsiders'),
                      'desc': (info.get('longBusinessSummary') or '')[:120],
                      'ma50': float(ma50),
                      'ma200': float(ma200),
                      'high52': float(high52),
                      'rel_vol': float(last_vol / avg_vol) if avg_vol > 0 else 0,
                      'eps_growth': info.get('earningsGrowth') or 0,
                  }
              except Exception as e:
                  print(ticker + ' error: ' + str(e))
                  return None

          def qscore(d):
              s = 0
              if d['roe'] and d['roe'] >= 0.15: s += 25
              if d['net_margin'] and d['net_margin'] >= 0.15: s += 25
              if d['gross_margin'] and d['gross_margin'] >= 0.40: s += 25
              if d['rev_growth'] and d['rev_growth'] >= 0.10: s += 25
              return s

          def make_row(d, fair, buy, gap, metrics):
              return {
                  'ticker': d['ticker'], 'name': d['name'], 'score': qscore(d),
                  'status': 'BUY ZONE' if d['price'] <= buy else 'WATCH',
                  'price': d['price'], 'fair': fair, 'buy': buy,
                  'disc': (d['price'] - fair) / fair * 100,
                  'metrics': metrics, 'desc': d['desc'], 'gap': gap,
              }

          def buffett(d):
              eps = d['eps_fwd']
              if not eps or eps <= 0: return None
              fair = eps * 22
              buy = fair * 0.85
              gap = (d['price'] - buy) / buy
              if gap > 0.10: return None
              m = []
              if d['roe']: m.append('ROE ' + str(round(d['roe']*100)) + '%')
              if d['net_margin']: m.append('NM ' + str(round(d['net_margin']*100)) + '%')
              if d['gross_margin']: m.append('GM ' + str(round(d['gross_margin']*100)) + '%')
              return make_row(d, fair, buy, gap, ' / '.join(m))

          def lynch(d):
              eps = d['eps_ttm'] or d['eps_fwd']
              growth = d['growth']
              if not eps or eps <= 0 or not growth or growth <= 0: return None
              gp = growth * 100
              fair = eps * gp
              buy = fair * 0.95
              gap = (d['price'] - buy) / buy
              if gap > 0.10: return None
              peg = ('PEG ' + str(round(d['peg'], 2))) if d['peg'] else ('PEG ~' + str(round(d['price']/fair, 2)))
              m = [peg, 'EPS +' + str(round(gp)) + '%']
              if d['rev_growth']: m.append('Rev +' + str(round(d['rev_growth']*100)) + '%')
              return make_row(d, fair, buy, gap, ' / '.join(m))

          def sleep_scan(d):
              if not d['fcf'] or not d['shares'] or d['shares'] <= 0: return None
              fcf_ps = d['fcf'] / d['shares']
              if fcf_ps <= 0: return None
              fair = fcf_ps / 0.04
              buy = fair * 0.90
              gap = (d['price'] - buy) / buy
              if gap > 0.10: return None
              m = []
              if d['rev_growth']: m.append('Rev +' + str(round(d['rev_growth']*100)) + '%')
              if d['roe']: m.append('ROE ' + str(round(d['roe']*100)) + '%')
              if d['insider_pct']: m.append('Insider ' + str(round(d['insider_pct']*100, 1)) + '%')
              return make_row(d, fair, buy, gap, ' / '.join(m))

          def minervini(d):
              p = d['price']
              ma50 = d['ma50']
              ma200 = d['ma200']
              high52 = d['high52']
              rel_vol = d['rel_vol']
              eps_growth = d['eps_growth']
              if p <= ma50: return None
              if p <= ma200: return None
              if ma50 <= ma200: return None
              if high52 <= 0: return None
              pct_from_high = (high52 - p) / high52
              if pct_from_high > 0.25: return None
              if eps_growth < 0.20: return None
              sepa_score = 0
              if p > ma50: sepa_score += 25
              if ma50 > ma200: sepa_score += 25
              if pct_from_high <= 0.15: sepa_score += 25
              if rel_vol >= 1.0: sepa_score += 25
              m = []
              m.append('MA50>' + 'MA200')
              m.append(str(round(pct_from_high*100)) + '% from High')
              m.append('EPS +' + str(round(eps_growth*100)) + '%')
              m.append('RelVol ' + str(round(rel_vol, 1)) + 'x')
              return {
                  'ticker': d['ticker'],
                  'name': d['name'],
                  'score': sepa_score,
                  'price': p,
                  'ma50': ma50,
                  'ma200': ma200,
                  'high52': high52,
                  'metrics': ' / '.join(m),
                  'desc': d['desc'],
                  'pct_from_high': pct_from_high,
              }

          def fmt(rank, s, prefix=''):
              emoji = '🟢' if 'BUY' in s['status'] else '🟡'
              lines = [
                  '',
                  '#' + str(rank) + ' ' + prefix + s['ticker'] + ' - ' + s['name'],
                  '  Quality: ' + str(s['score']) + '/100 | ' + emoji + ' ' + s['status'],
                  '  Price: $' + str(round(s['price'], 2)) + ' | Fair: $' + str(round(s['fair'], 2)) + ' (' + str(round(s['disc'])) + '%) | Buy: $' + str(round(s['buy'], 2)),
                  '  ' + s['metrics'],
              ]
              if s['desc']: lines.append('  ' + s['desc'])
              return '\n'.join(lines)

          def fmt_mini(rank, s):
              lines = [
                  '',
                  '#' + str(rank) + ' ' + s['ticker'] + ' - ' + s['name'],
                  '  SEPA Score: ' + str(s['score']) + '/100',
                  '  Price: $' + str(round(s['price'], 2)) + ' | MA50: $' + str(round(s['ma50'], 2)) + ' | 52W High: $' + str(round(s['high52'], 2)),
                  '  ' + s['metrics'],
              ]
              if s['desc']: lines.append('  ' + s['desc'])
              return '\n'.join(lines)

          def main():
              print('Scanning...')
              buf, lyn, slp, mini = [], [], [], []
              for ticker in WATCHLIST:
                  d = fetch(ticker)
                  if not d: continue
                  r = buffett(d)
                  if r: buf.append(r)
                  r = lynch(d)
                  if r: lyn.append(r)
                  r = sleep_scan(d)
                  if r: slp.append(r)
                  r = minervini(d)
                  if r: mini.append(r)
              key = lambda x: (x['gap'], -x['score'])
              buf.sort(key=key); lyn.sort(key=key); slp.sort(key=key)
              mini.sort(key=lambda x: (-x['score'], x['pct_from_high']))
              today = datetime.now(pytz.timezone(TIMEZONE)).strftime('%d %b %Y')
              send('<b>VI + Momentum Daily Scan - ' + today + '</b>\n🟢 BUY ZONE = price below buy\n🟡 WATCH = within 10% above buy\n📈 SEPA = Minervini Trend Template\nVerify before investing.')
              if buf:
                  send('<b>WARREN BUFFETT Style</b>\n(Fair=EPS x 22 / Buy=Fair x 0.85)' + ''.join(fmt(i+1, s) for i, s in enumerate(buf[:TOP_N])))
              if lyn:
                  send('<b>PETER LYNCH Style</b>\n(Fair=EPS x Growth / Buy=Fair x 0.95)' + ''.join(fmt(i+1, s, 'Fast Grower: ') for i, s in enumerate(lyn[:TOP_N])))
              if slp:
                  send('<b>NICK SLEEP Style</b>\n(Fair=FCF/0.04 / Buy=Fair x 0.90)' + ''.join(fmt(i+1, s) for i, s in enumerate(slp[:TOP_N])))
              if mini:
                  send('<b>MINERVINI SEPA Style</b>\n(Price>MA50>MA200 / Near 52W High / EPS>20%)' + ''.join(fmt_mini(i+1, s) for i, s in enumerate(mini[:TOP_N])))
              else:
                  send('<b>MINERVINI SEPA Style</b>\nNo stocks passing SEPA criteria today.')
              print('Done.')

          main()
          PYEOF

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py
