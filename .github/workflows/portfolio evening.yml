# .github/workflows/portfolio evening.yml
# ส่ง Evening Report ทุกวันจันทร์-ศุกร์ เวลา 16:05 ET (หลังตลาดปิด 5 นาที)

name: 🌙 Portfolio Evening Report

on:
  schedule:
    # 16:05 ET = 20:05 UTC (EST) | 21:05 UTC (EDT)
    - cron: '5 20 * * 1-5'
  workflow_dispatch:

jobs:
  evening-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Evening Report
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPORT_MODE:      evening
        run: python portfolio_tracker.py
